<!-- Talons -->
<g stroke="#3a3060" stroke-width="2.5" fill="none" opacity=".55">
<line x1="-40" y1="36" x2="-30" y2="58"/><line x1="-30" y1="58" x2="-22" y2="58"/>
<line x1="-40" y1="36" x2="-50" y2="58"/><line x1="-50" y1="58" x2="-58" y2="58"/>
<line x1="40" y1="36" x2="30" y2="58"/><line x1="30" y1="58" x2="22" y2="58"/>
<line x1="40" y1="36" x2="50" y2="58"/><line x1="50" y1="58" x2="58" y2="58"/>
</g>
</g>
<!-- Diamonds -->
<g opacity=".5">
<rect x="88" y="138" width="10" height="10" fill="#e8a8c8" transform="rotate(45,93,143)"/>
<rect x="376" y="122" width="9" height="9" fill="#e8a8c8" transform="rotate(45,380,126)"/>
<rect x="50" y="200" width="8" height="8" fill="#d4c8a8" transform="rotate(45,54,204)" opacity=".65"/>
