<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="sk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a3858"/><stop offset="55%" stop-color="#3a4870"/><stop offset="100%" stop-color="#485880"/></linearGradient>
<radialGradient id="mn" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff" stop-opacity=".95"/><stop offset="70%" stop-color="#f8f0e0" stop-opacity=".9"/><stop offset="100%" stop-color="#e8d8c0" stop-opacity=".7"/></radialGradient>
<linearGradient id="ms" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="100%" stop-color="#fff" stop-opacity=".4"/></linearGradient>
</defs>
<rect width="480" height="480" fill="url(#sk)"/>
