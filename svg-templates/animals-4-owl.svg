<polygon points="11,-56 20,-44 4,-40" fill="#c8bc98"/>
<!-- Eyes -->
<circle cx="-11" cy="-30" r="10" fill="white" opacity=".95"/>
<circle cx="11" cy="-30" r="10" fill="white" opacity=".95"/>
<circle cx="-11" cy="-30" r="6" fill="#4a7898"/>
<circle cx="11" cy="-30" r="6" fill="#4a7898"/>
<circle cx="-10" cy="-31" r="3" fill="#1a1628"/>
<circle cx="10" cy="-31" r="3" fill="#1a1628"/>
<!-- Beak -->
