<circle cx="282" cy="158" r="90" fill="url(#mn)"/>
<circle cx="282" cy="158" r="90" fill="none" stroke="#485880" stroke-width="2" opacity=".28"/>
<circle cx="282" cy="158" r="104" fill="none" stroke="#485880" stroke-width="5" opacity=".22"/>
<!-- Bare trees -->
<g opacity=".22" fill="#2a2840">
<rect x="18" y="198" width="10" height="282"/><rect x="68" y="238" width="7" height="242"/>
<rect x="440" y="178" width="11" height="302"/><rect x="402" y="218" width="8" height="262"/>
</g>
