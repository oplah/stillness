<path d="M76,298 Q98,291 120,298" stroke="#3a3060" stroke-width="10" fill="none" stroke-linecap="round"/>
<path d="M360,298 Q382,291 404,298" stroke="#3a3060" stroke-width="10" fill="none" stroke-linecap="round"/>
