<g stroke="#6898c8" stroke-width="1.5" fill="none" opacity=".3">
<path d="M158,380 Q200,373 242,380 Q282,387 322,380"/>
</g>
<!-- Diamonds -->
<g opacity=".52">
<rect x="128" y="186" width="11" height="11" fill="#e8d060" transform="rotate(45,133,191)"/>
<rect x="352" y="168" width="10" height="10" fill="#f0c840" transform="rotate(45,357,173)"/>
<rect x="66" y="252" width="9" height="9" fill="#e8d060" transform="rotate(45,70,256)"/>
<rect x="394" y="226" width="9" height="9" fill="#f0c840" transform="rotate(45,398,230)"/>
</g>
<rect width="480" height="480" fill="url(#ms)" opacity=".24"/>
</svg>
